name: Playwright Tests with Allure Deploy

on:
  pull_request:
    branches: [master]

jobs:
  test:
    name: Run e2e Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run selective Playwright tests
        run: pnpm run e2e:changed
        env:
          CI: true

      - name: Generate Allure Report
        if: always()
        run: |
          pnpm exec allure generate ./allure-results --clean

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

  deploy-allure:
    name: Deploy Allure Report
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: ./downloaded-allure-report

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy Allure Report to Server
        run: |
          # Создаем папку с правильными правами
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /home/deployer/allure-reports/pr-${{ github.event.number }} && chmod 755 /home/deployer/allure-reports/pr-${{ github.event.number }}"

          # Копируем файлы
          scp -o StrictHostKeyChecking=no -r ./downloaded-allure-report/* \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/deployer/allure-reports/pr-${{ github.event.number }}/

          # Фиксим права после копирования
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "chmod -R 755 /home/deployer/allure-reports/pr-${{ github.event.number }}/"

      - name: Verify Deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "ls -la /home/deployer/allure-reports/pr-${{ github.event.number }}/"

      - name: Comment PR with Allure Link
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: allure-report
          message: |
            ## 📊 Allure Test Report

            ### 🎯 Online Report Available:
            **[View Allure Report](http://${{ secrets.SERVER_HOST }}:8888/pr-${{ github.event.number }}/)**

            ### 📋 Test Summary:
            - **Status:** ${{ needs.test.result }}
            - **PR:** #${{ github.event.number }}
            - **Report URL:** http://${{ secrets.SERVER_HOST }}:8888/pr-${{ github.event.number }}/
            - **Last Updated:** ${{ github.event.pull_request.updated_at }}

            💡 _Report updates automatically on each test run_

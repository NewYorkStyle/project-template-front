name: Playwright Tests with Allure Deploy

on:
  pull_request:
    branches: [master]

jobs:
  test:
    name: Run e2e Tests (${{ matrix.browser }})
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Start backend + DB
        run: docker compose -f docker-compose.e2e.yml up -d

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl --fail --max-time 2 http://localhost:3000/health; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            echo "⏳ Waiting for backend..."
            sleep 2
          done
          echo "❌ Backend did not become ready in time" >&2
          docker compose -f docker-compose.e2e.yml logs
          exit 1

      - name: Run selective Playwright tests
        run: pnpm e2e:changed
        env:
          CI: true
          NODE_ENV: test
          VITE_API_URL: http://localhost:3000
          PLAYWRIGHT_PROJECT: ${{ matrix.browser }}

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 30

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  deploy-allure:
    name: Deploy Allure Report
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Скачиваем ВСЕ результаты
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          path: ./allure-results

      # Объединяем
      - name: Merge Allure Results
        run: |
          mkdir merged-results
          find allure-results -type f -exec cp {} merged-results/ \;

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Генерим один отчёт
      - name: Generate Allure Report
        run: pnpm exec allure generate ./merged-results --clean -o allure-report

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy Allure Report to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /home/deployer/allure-reports/pr-${{ github.event.number }} && chmod 755 /home/deployer/allure-reports/pr-${{ github.event.number }}"

          scp -o StrictHostKeyChecking=no -r ./allure-report/* \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/deployer/allure-reports/pr-${{ github.event.number }}/

          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "chmod -R 755 /home/deployer/allure-reports/pr-${{ github.event.number }}/"

      - name: Verify Deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "ls -la /home/deployer/allure-reports/pr-${{ github.event.number }}/"

      - name: Comment PR with Allure Link
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: allure-report
          message: |
            ## 📊 Allure Test Report

            ### 🎯 Online Report Available:
            **[View Allure Report](http://${{ secrets.SERVER_HOST }}:8888/pr-${{ github.event.number }}/)**

            ### 📋 Test Summary:
            - **Status:** ${{ needs.test.result }}
            - **PR:** #${{ github.event.number }}
            - **Report URL:** http://${{ secrets.SERVER_HOST }}:8888/pr-${{ github.event.number }}/
            - **Last Updated:** ${{ github.event.pull_request.updated_at }}

            💡 _Report updates automatically on each test run_
